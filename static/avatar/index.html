<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Partner Avatar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  #avatar-container {
    position: relative;
    width: 300px;
    height: 300px;
  }
  canvas { border-radius: 50%; }
  #status {
    margin-top: 16px;
    font-size: 13px;
    color: #888;
    text-align: center;
  }
  #emotion-label {
    margin-top: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #7c3aed;
    text-transform: capitalize;
  }
  #name {
    margin-top: 4px;
    font-size: 18px;
    font-weight: 700;
    color: #c4b5fd;
  }
  .connection-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .connected { background: #4ade80; }
  .disconnected { background: #ef4444; }
</style>
</head>
<body>

<div id="avatar-container">
  <canvas id="avatar" width="300" height="300"></canvas>
</div>
<div id="name">Aria</div>
<div id="emotion-label">neutral</div>
<div id="status">
  <span class="connection-dot disconnected" id="dot"></span>
  <span id="status-text">Connecting...</span>
</div>

<script>
/**
 * AI Partner Avatar — Canvas-based with expressions, blinking, breathing, idle movement.
 *
 * Research: "Procedural idle animations (breathing, blinking, eye movement)
 * consume less than 0.1 ms of CPU per frame but transform a static image into a living character."
 *
 * Connects to the partner backend via polling for emotion updates.
 * Future: WebSocket for real-time lip sync with TalkingHead.js
 */

const canvas = document.getElementById('avatar');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;
const R = W * 0.38;

let emotion = 'neutral';
let isSpeaking = false;
let isThinking = false;
let blinkState = 0; // 0=open, 1=closing, 2=closed, 3=opening
let blinkTimer = 0;
let mouthOpen = 0;
let breathPhase = 0;
let swayPhase = 0;
let time = 0;

// Color palette
const PRIMARY = '#7c3aed';
const EMOTION_COLORS = {
  neutral: '#7c3aed', happy: '#f59e0b', sad: '#3b82f6', excited: '#f59e0b',
  angry: '#ef4444', anxious: '#f97316', surprised: '#a855f7', thinking: '#06b6d4',
  frustrated: '#ef4444', stressed: '#f97316',
};

function getEmotionColor() {
  return EMOTION_COLORS[emotion] || PRIMARY;
}

// ── Blink system (Poisson, mean ~4s) ──
let nextBlink = 2000 + Math.random() * 5000;
let blinkProgress = 0;

function updateBlink(dt) {
  blinkTimer += dt;
  if (blinkState === 0 && blinkTimer > nextBlink) {
    blinkState = 1;
    blinkTimer = 0;
    blinkProgress = 0;
  }
  if (blinkState === 1) { // closing
    blinkProgress += dt / 80;
    if (blinkProgress >= 1) { blinkState = 2; blinkProgress = 0; }
  }
  if (blinkState === 2) { // hold closed
    blinkProgress += dt / 60;
    if (blinkProgress >= 1) { blinkState = 3; blinkProgress = 0; }
  }
  if (blinkState === 3) { // opening
    blinkProgress += dt / 100;
    if (blinkProgress >= 1) {
      blinkState = 0;
      blinkProgress = 0;
      nextBlink = 2000 + Math.random() * 5000;
      // Occasional double blink
      if (Math.random() < 0.2) nextBlink = 200;
    }
  }
}

function isBlinking() {
  return blinkState === 1 || blinkState === 2;
}

// ── Draw functions ──

function drawHead() {
  const gradient = ctx.createRadialGradient(CX - R * 0.3, CY - R * 0.3, 0, CX, CY, R * 1.3);
  gradient.addColorStop(0, getEmotionColor() + '40');
  gradient.addColorStop(0.7, getEmotionColor() + '18');
  gradient.addColorStop(1, getEmotionColor() + '08');

  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Outline
  ctx.strokeStyle = getEmotionColor() + '60';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Glow
  ctx.beginPath();
  ctx.arc(CX, CY, R + 12, 0, Math.PI * 2);
  ctx.fillStyle = getEmotionColor() + '10';
  ctx.filter = 'blur(15px)';
  ctx.fill();
  ctx.filter = 'none';
}

function drawEyes() {
  const eyeY = CY - R * 0.1;
  const spacing = R * 0.35;
  const er = R * 0.12;

  if (isBlinking()) {
    ctx.strokeStyle = getEmotionColor();
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    [-1, 1].forEach(side => {
      ctx.beginPath();
      ctx.moveTo(CX + side * spacing - er, eyeY);
      ctx.lineTo(CX + side * spacing + er, eyeY);
      ctx.stroke();
    });
    return;
  }

  ctx.fillStyle = getEmotionColor();
  if (emotion === 'happy' || emotion === 'excited') {
    ctx.strokeStyle = getEmotionColor();
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    [-1, 1].forEach(side => {
      ctx.beginPath();
      ctx.moveTo(CX + side * spacing - er, eyeY + 2);
      ctx.quadraticCurveTo(CX + side * spacing, eyeY - er, CX + side * spacing + er, eyeY + 2);
      ctx.stroke();
    });
  } else if (emotion === 'surprised') {
    [-1, 1].forEach(side => {
      ctx.beginPath();
      ctx.arc(CX + side * spacing, eyeY, er * 1.3, 0, Math.PI * 2);
      ctx.fill();
    });
  } else {
    [-1, 1].forEach(side => {
      ctx.beginPath();
      ctx.ellipse(CX + side * spacing, eyeY, er * 0.8, er * 1.1, 0, 0, Math.PI * 2);
      ctx.fill();
    });
  }
}

function drawMouth() {
  const my = CY + R * 0.3;
  const mw = R * 0.35;

  ctx.strokeStyle = getEmotionColor();
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';

  if (isSpeaking) {
    const openH = mouthOpen * R * 0.15 + 4;
    ctx.fillStyle = getEmotionColor() + '30';
    ctx.beginPath();
    ctx.ellipse(CX, my, mw * 0.6, openH / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  } else if (emotion === 'happy' || emotion === 'excited') {
    ctx.beginPath();
    ctx.moveTo(CX - mw, my);
    ctx.quadraticCurveTo(CX, my + R * 0.15, CX + mw, my);
    ctx.stroke();
  } else if (emotion === 'sad') {
    ctx.beginPath();
    ctx.moveTo(CX - mw, my + 5);
    ctx.quadraticCurveTo(CX, my - R * 0.08, CX + mw, my + 5);
    ctx.stroke();
  } else if (emotion === 'surprised') {
    ctx.beginPath();
    ctx.arc(CX, my + 3, R * 0.08, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(CX - mw * 0.7, my);
    ctx.quadraticCurveTo(CX, my + 3, CX + mw * 0.7, my);
    ctx.stroke();
  }
}

function drawThinkingDots() {
  if (!isThinking) return;
  const dotPhase = time * 3;
  for (let i = 0; i < 3; i++) {
    const alpha = 0.3 + 0.4 * Math.sin(dotPhase + i * 1.5);
    ctx.fillStyle = `rgba(124, 58, 237, ${alpha})`;
    ctx.beginPath();
    ctx.arc(CX + R + 18 + i * 14, CY - R * 0.3 - i * 8, 3 + i * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Main render loop ──
let lastTime = performance.now();

function render(now) {
  const dt = now - lastTime;
  lastTime = now;
  time += dt / 1000;

  // Update animations
  breathPhase = Math.sin(time * 1.46); // ~14 cycles/min
  swayPhase = time * 0.5;
  updateBlink(dt);
  if (isSpeaking) mouthOpen = 0.3 + 0.7 * Math.abs(Math.sin(time * 12));
  else mouthOpen = 0;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Apply breathing + sway
  ctx.save();
  const scale = 1 + breathPhase * 0.015;
  const sx = Math.sin(swayPhase * 2) * 2;
  const sy = Math.cos(swayPhase * 1.4) * 1.5;
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);
  ctx.translate(-W / 2 + sx, -H / 2 + sy);

  drawHead();
  drawEyes();
  drawMouth();
  drawThinkingDots();

  ctx.restore();
  requestAnimationFrame(render);
}

requestAnimationFrame(render);

// ── Backend connection (polling) ──
const API_BASE = window.location.origin;

async function pollStatus() {
  try {
    const res = await fetch(`${API_BASE}/partner/stats`);
    const data = await res.json();
    document.getElementById('name').textContent = data.profile?.name || 'Aria';
    document.getElementById('dot').className = 'connection-dot connected';
    document.getElementById('status-text').textContent = `Connected • ${data.interaction_count || 0} conversations`;
  } catch (e) {
    document.getElementById('dot').className = 'connection-dot disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
  }
}

// Listen for emotion events via EventSource
function connectSSE() {
  // No permanent SSE for avatar — poll periodically instead
  // In future: WebSocket for real-time lip sync
  setInterval(pollStatus, 5000);
  pollStatus();
}

// Allow external control via postMessage (from Flutter WebView or parent frame)
window.addEventListener('message', (event) => {
  const data = event.data;
  if (data.type === 'emotion') {
    emotion = data.emotion || 'neutral';
    document.getElementById('emotion-label').textContent = emotion;
  }
  if (data.type === 'speaking') isSpeaking = !!data.value;
  if (data.type === 'thinking') isThinking = !!data.value;
});

// Also accept URL params
const params = new URLSearchParams(window.location.search);
if (params.get('name')) document.getElementById('name').textContent = params.get('name');

connectSSE();
</script>
</body>
</html>
