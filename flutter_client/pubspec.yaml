name: local_ai_flutter_client
description: Flutter web/windows UI for Local AI LangChain Platform
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.3.0
  file_picker: ^10.3.10
  flutter_markdown_plus: ^1.0.3
  url_launcher: ^6.2.0
  markdown: ^7.0.0
  audioplayers: ^6.1.0
  record: ^5.1.0

dependency_overrides:
  record_linux: ^1.3.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
